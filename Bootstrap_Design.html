<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Page</title>
    <!-- Tiny version of Bootstrap -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body {
            background: #eef;
            text-align: center;
            padding-top: 50px;
        }

        .mini-card {
            max-width: 300px;
            margin: auto;
            border: 3px solid #007bff;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card mini-card p-3 shadow-sm">
            <h1 class="h4">Hi! 👋</h1>
            <p>This is my tiny Bootstrap page.</p>
            <button class="btn btn-sm btn-primary">Cool Button</button>
        </div>
    </div>

</body>

</html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
</head>
<body>
    <h2>User Registration</h2>
    
    <form action="/submit-form" method="POST">
        
        
        <label for="fname">First Name:</label><br>
        <input type="text" id="fname" name="firstname" required><br><br>

        
        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="user_email" placeholder="example@mail.com" required><br><br>

        <label for="pwd">Password:</label><br>
        <input type="password" id="pwd" name="password" minlength="8" required><br><br>

        
        <p>Gender:</p>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br>


        <label for="country">Country:</label>
        <select id="country" name="country">
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="india">India</option>
        </select><br><br>

        
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">I agree to the terms and conditions</label><br><br>

        
        <button type="submit">Register</button>
        <button type="reset">Clear Form</button>

    </form>
</body>
</html>

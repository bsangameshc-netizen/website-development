<html>

<head>
    <style>
        div {
            right: 30px;
            border: 3px solid #73AD21;
        }

        div.absolute {
            position: absolute;
            left: 50px;
            border: 3px solid blue;

        }

        div.relative {
            position: relative;
            left: 50px;
            border: 3px solid blue;

        }

        div.fixed {
            position: fixed;
            top: 0;
            right: 20px;
            width: 300px;

        }

        div.sticky {
            position: sticky;
            top: 1px;
            left: 20px;
            right: 100px;
            border: 3px solid #73AD21;

        }
    </style>
</head>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic HTML & CSS Page</title>

<style>
body {
font-family: 'Arial', sans-serif;
background-color: #f0f0f0;
color: #333;
margin: 20px;
padding: 0;
}

h1 {
color: #0056b3;
border-bottom: 2px solid #0056b3;
padding-bottom: 10px;
}

p {

line-height: 1.6;
}

.highlight {
background-color: #ffebcd;
padding: 10px;
border: 1px solid #ffa07a;
border-radius: 5px;
}

</style>

</head>
<body>
<h1>Welcome to My Basic Webpage</h1>
<p>This is a standard paragraph of text .</p>

<div class="highlight">
    <h2>A styled section (Using a CSS class)</h2>
    <p>This section uses a CSS class named "highlight" to give it a distinct background and border.</p>
</div>
<P>You can learn about HTML and CSS with free tutorials</P>

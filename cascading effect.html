<html>

<head>
    <title>My First Webpage</title>

    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: darkblue;
        }

        p {
            color: #333;
            font-size: 18px;
        }

        .highlight {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Page</h1>
    <p>This is a simple paragraph styled with CSS.</p>
    <p class="highlight">This text is red because of the cascade effect</p>

</body>

</html>
